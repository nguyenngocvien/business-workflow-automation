spring.application.name=e-workflow

# -----------------------------
# Server
# -----------------------------
server.port=8080
server.servlet.context-path=/

# -----------------------------
# Datasource - PostgreSQL sample
# -----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/e_workflow
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------
# Camunda 8 Client
# -----------------------------
camunda.client.mode=self-managed
camunda.client.grpc-address=http://localhost:26500
camunda.client.rest-address=http://localhost:8088
camunda.client.prefer-rest-over-grpc=false
camunda.client.auth.method=none
camunda.client.worker.defaults.max-jobs-active=32
camunda.client.worker.defaults.poll-interval=PT0.1S

# -----------------------------
# Flyway
# -----------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -----------------------------
# Jackson
# -----------------------------
spring.jackson.time-zone=Asia/Bangkok

# -----------------------------
# Logging
# -----------------------------
logging.level.root=INFO
logging.level.com.workflow=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.org.camunda=INFO
logging.level.io.camunda=INFO

# -----------------------------
# Actuator
# -----------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# -----------------------------
# Swagger / OpenAPI
# -----------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.default-produces-media-type=application/json

# -----------------------------
# Spring Security
# -----------------------------
spring.security.user.name=admin
spring.security.user.password=admin123
app.security.user.roles=ADMIN,USER
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# -----------------------------
# OpenFeign / HTTP client sample
# -----------------------------
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=10000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# -----------------------------
# RabbitMQ
# -----------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
