services:

  # -----------------------------
  # POSTGRES
  # -----------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Init multiple databases via entrypoint script
      POSTGRES_MULTIPLE_DATABASES: bpm,keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro  # see init-db.sh
    restart: unless-stopped
    networks:
      - workflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # ELASTICSEARCH
  # -----------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - workflow_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -----------------------------
  # KIBANA
  # -----------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - workflow_net

  # -----------------------------
  # KEYCLOAK
  # -----------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak   # FIX: DB riêng cho Keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    restart: on-failure
    networks:
      - workflow_net                                          # FIX: thêm network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'HTTP/1.1 200 OK' <&3",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # ZEEBE — workflow engine (broker)
  # ─────────────────────────────────────────
  zeebe:
    image: camunda/zeebe:8.5.0
    container_name: zeebe
    restart: unless-stopped
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
      - ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_MODE=none
      - ZEEBE_BROKER_NETWORK_HOST=0.0.0.0
    ports:
      - "26500:26500"   # gRPC gateway (clients / workers)
      - "9600:9600"     # monitoring / REST
      - "8088:8080"     # management API
    volumes:
      - zeebe_data:/usr/local/zeebe/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - workflow_net
    healthcheck:
      # test: ["CMD-SHELL", "wget -qO- http://localhost:9600/actuator/health/readiness | grep -q UP"]
      test: ["CMD-SHELL", "wget -qO- http://localhost:9600/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # OPERATE — monitor & manage process instances
  # ─────────────────────────────────────────
  operate:
    image: camunda/operate:8.5.0
    container_name: operate
    restart: unless-stopped
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8081:8080"
    depends_on:
      zeebe:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - workflow_net

  # -----------------------------
  # MINIO
  # -----------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - workflow_net                                          # FIX: thêm network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------
  # RABBITMQ
  # -----------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - workflow_net                                          # FIX: thêm network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -----------------------------
  # WORKFLOW SERVICE
  # -----------------------------
  workflow-service:
    build:
      context: ./backend/workflow-service
      dockerfile: Dockerfile
    container_name: workflow-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bpm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      CAMUNDA_CLIENT_MODE: self-managed
      CAMUNDA_CLIENT_GRPC_ADDRESS: http://zeebe:26500        # FIX: orchestration → zeebe
      CAMUNDA_CLIENT_REST_ADDRESS: http://zeebe:8080         # FIX: orchestration → zeebe
      CAMUNDA_CLIENT_PREFER_REST_OVER_GRPC: "false"
      CAMUNDA_CLIENT_AUTH_METHOD: none
    ports:
      - "8085:8080"
    networks:
      - workflow_net                                          # FIX: thêm network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zeebe:                                                 # FIX: orchestration → zeebe
        condition: service_healthy
      keycloak:                                              # FIX: thêm dependency Keycloak
        condition: service_healthy

  # -----------------------------
  # INTEGRATION SERVICE
  # -----------------------------
  integration-service:
    build:
      context: ./backend/integration-service
      dockerfile: Dockerfile
    container_name: integration-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bpm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8089:8080"
    networks:
      - workflow_net                                          # FIX: thêm network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:                                              # FIX: thêm dependency Keycloak
        condition: service_healthy

# -----------------------------
# VOLUMES
# -----------------------------
volumes:
  postgres_data:
  elasticsearch_data:                                        # FIX: đổi tên từ es_data
  zeebe_data:                                                # FIX: đổi tên từ orchestration_data
  minio_data:
  rabbitmq_data:

# -----------------------------
# NETWORKS
# -----------------------------
networks:
  workflow_net:                                               # FIX: khai báo network còn thiếu
    driver: bridge