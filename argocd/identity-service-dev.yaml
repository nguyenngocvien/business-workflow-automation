apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: identity-service-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/viennn/baw-gitops.git
    targetRevision: main

    path: helm/identity-service

    helm:
      valueFiles:
        - ../../environments/dev/identity-service/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true