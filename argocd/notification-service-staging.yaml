apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: notification-service-staging
  namespace: argocd

spec:
  project: backend-services

  source:
    repoURL: https://github.com/nguyenngocvien/business-workflow-automation.git
    targetRevision: main
    path: gitops/apps/notification-service

    helm:
      valueFiles:
        - ../../environments/staging/notification-service/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
