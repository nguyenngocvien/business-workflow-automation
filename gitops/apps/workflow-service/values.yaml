replicaCount: 1

image:
  repository: viennn/workflow-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPort: 8080

env:
  SPRING_PROFILES_ACTIVE: local
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bpm
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
  EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery-server:8761/eureka/
  CAMUNDA_CLIENT_MODE: self-managed
  CAMUNDA_CLIENT_GRPC_ADDRESS: http://zeebe:26500
  CAMUNDA_CLIENT_REST_ADDRESS: http://zeebe:8080
  CAMUNDA_CLIENT_PREFER_REST_OVER_GRPC: "false"
  CAMUNDA_CLIENT_AUTH_ENABLED: "false"
  WORKFLOW_PROVIDER: camunda
  IBM_BPM_BASE_URL: http://ibm-bpm:9080/bpm
  IBM_BPM_USERNAME: ""
  IBM_BPM_PASSWORD: ""
  SPRING_SECURITY_USER_NAME: admin
  SPRING_SECURITY_USER_PASSWORD: admin123
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest
