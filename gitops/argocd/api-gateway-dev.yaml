apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: api-gateway-dev
  namespace: argocd

spec:
  project: backend-services

  source:
    repoURL: https://github.com/nguyenngocvien/business-workflow-automation.git
    targetRevision: main
    path: gitops/apps/api-gateway

    helm:
      valueFiles:
        - ../../environments/dev/api-gateway/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
