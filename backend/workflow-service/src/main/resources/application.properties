spring.application.name=workflow-service

# -----------------------------
# Server
# -----------------------------
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# -----------------------------
# Datasource - PostgreSQL sample
# -----------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bpm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------
# Flyway
# -----------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -----------------------------
# Camunda 8 Client
# -----------------------------
camunda.client.mode=${CAMUNDA_CLIENT_MODE:self-managed}
camunda.client.grpc-address=${CAMUNDA_CLIENT_GRPC_ADDRESS:http://localhost:26500}
camunda.client.rest-address=${CAMUNDA_CLIENT_REST_ADDRESS:http://localhost:8088}
camunda.client.prefer-rest-over-grpc=${CAMUNDA_CLIENT_PREFER_REST_OVER_GRPC:false}
camunda.client.auth.enabled=${CAMUNDA_CLIENT_AUTH_ENABLED:false}
camunda.client.worker.defaults.max-jobs-active=32
camunda.client.worker.defaults.poll-interval=PT0.1S

# -----------------------------
# Workflow Provider Switch
# -----------------------------
# camunda = use Camunda adapters, ibm = use IBM BPM adapters
workflow.provider=${WORKFLOW_PROVIDER:camunda}
# workflow.provider=ibm

# -----------------------------
# IBM BPM / BAW
# -----------------------------
# Standard REST API base URL usually looks like http://host:port/bpm
ibm.bpm.base-url=${IBM_BPM_BASE_URL:http://localhost:9080/bpm}
ibm.bpm.username=${IBM_BPM_USERNAME:}
ibm.bpm.password=${IBM_BPM_PASSWORD:}
ibm.bpm.refresh-groups=false
ibm.bpm.requested-lifetime-seconds=7200
ibm.bpm.default-task-states=ready
ibm.bpm.default-optional-parts=all
# Optional query defaults
# ibm.bpm.query-defaults.task-model=OrderManagement
# ibm.bpm.query-defaults.process-model=OrderManagement
# ibm.bpm.query-defaults.process-id=OrderProcess
# ibm.bpm.query-defaults.task-process-id=OrderProcess

# -----------------------------
# Jackson
# -----------------------------
spring.jackson.time-zone=Asia/Bangkok

# -----------------------------
# Logging
# -----------------------------
logging.level.root=INFO
logging.level.com.workflow=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
logging.level.org.camunda=INFO
logging.level.io.camunda=INFO

# -----------------------------
# Actuator
# -----------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# -----------------------------
# Swagger / OpenAPI
# -----------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.default-produces-media-type=application/json


# -----------------------------
# Spring Security
# -----------------------------
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin123}
app.security.user.roles=ADMIN,USER
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# -----------------------------
# OpenFeign / HTTP client sample
# -----------------------------
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=10000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# -----------------------------
# RabbitMQ
# -----------------------------
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
