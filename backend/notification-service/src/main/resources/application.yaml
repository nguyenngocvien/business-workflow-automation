spring:
  application:
    name: notification-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password # Password Google app
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Config Queue Name
notification:
  rabbitmq:
    queue: notification.queue
    exchange: notification.exchange
    routing-key: notification.routingKey