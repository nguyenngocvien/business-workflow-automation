spring:
  application:
    name: ${SPRING_APPLICATION_NAME:config-server}
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/nguyenngocvien/baw-config-repo.git}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}

server:
  port: ${SERVER_PORT:8888}
